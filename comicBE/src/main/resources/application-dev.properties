spring.application.name=comicBE
spring.servlet.multipart.max-file-size=1000MB

spring.servlet.multipart.max-request-size=2000MB

crawler.hotlink=false
crawler.cover-image-dir=./covers
server.port=8081


spring.datasource.url=jdbc:mariadb://localhost:3306/comic?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=my-secret-pw
#spring.datasource.password=root
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.autocommit=false
# S? b?n ghi gom výo 1 batch
spring.jpa.properties.hibernate.jdbc.batch_size=50
# Gom c·c c‚u INSERT l?i theo th? t? ?? t?i ?u batch
spring.jpa.properties.hibernate.order_inserts=true
# Gom UPDATE (n?u b?n c?n)
spring.jpa.properties.hibernate.order_updates=true
# Batch cho entity cÛ @Version n?u d˘ng optimistic locking
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000


spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379



# --- Lettuce pool settings ---
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=500
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=5000ms
# (optional)
spring.data.redis.lettuce.pool.time-between-eviction-runs=60000ms
spring.data.redis.lettuce.pool.test-while-idle=true



server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=2KB

server.tomcat.max-threads=10000


